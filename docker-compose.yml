services:
  relay:
    build: ./relay-server
    ports:
      - "127.0.0.1:${RELAY_PORT:-8080}:8080"
    environment:
      - DOMAIN=${DOMAIN}
      - REDIS_URL=${REDIS_URL}
      - PAIRING_TOKEN_TTL=${PAIRING_TOKEN_TTL}
      - PROTOCOL_VERSION=${PROTOCOL_VERSION:-2}
      - TERMHOP_RELEASE=${TERMHOP_RELEASE:-development}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
