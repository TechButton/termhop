services:
  relay:
    build: ./relay-server
    ports:
      - "127.0.0.1:${RELAY_PORT:-8080}:8080"
    environment:
      - DOMAIN=${DOMAIN}
      - REDIS_URL=${REDIS_URL}
      - PAIRING_TOKEN_TTL=${PAIRING_TOKEN_TTL}
      - PROTOCOL_VERSION=${PROTOCOL_VERSION:-2}
      - CLIENT_ORIGINS=${CLIENT_ORIGINS}
      - HANDSHAKE_TIMEOUT_S=${HANDSHAKE_TIMEOUT_S:-20}
      - TERMHOP_RELEASE=${TERMHOP_RELEASE:-development}
      - TRUSTED_PROXY_IPS=${TRUSTED_PROXY_IPS:-}
      - MAX_CONNECTIONS_PER_IP=${MAX_CONNECTIONS_PER_IP:-40}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m

  redis:
    image: redis:7-alpine
    user: redis
    command: redis-server --save "" --appendonly no --maxmemory 96mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 128m
