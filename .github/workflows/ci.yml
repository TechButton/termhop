name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: relay-server/requirements*.txt
      - run: python -m pip install -r requirements-dev.txt
        working-directory: relay-server
      - run: pytest -q
        working-directory: relay-server
      - run: ruff check relay tests
        working-directory: relay-server
      - run: mypy relay
        working-directory: relay-server
      - run: pip-audit -r requirements.txt
        working-directory: relay-server

  agent-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/requirements*.txt
      - run: python -m pip install -r requirements-dev.txt -r requirements-linux.txt
        working-directory: agent
      - run: pytest -q
        working-directory: agent
      - run: ruff check common linux macos windows tests
        working-directory: agent
      - run: mypy common linux macos windows
        working-directory: agent
      - run: pip-audit -r requirements.txt -r requirements-linux.txt
        working-directory: agent

  agent-platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            requirements: requirements-macos.txt
            test: tests/test_pty_backend_macos.py
          - os: windows-latest
            requirements: requirements-windows.txt
            test: tests/test_pty_backend_windows.py
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/requirements*.txt
      - run: python -m pip install -r requirements.txt -r ${{ matrix.requirements }} pytest pytest-asyncio
        working-directory: agent
      - run: python -m pytest -q ${{ matrix.test }}
        working-directory: agent

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npm test
        working-directory: client
      - run: npm run build
        working-directory: client
      - run: npm audit --omit=dev --audit-level=high
        working-directory: client
